- name: INSE 6150 - Security Evaluation Methodologies
  role: Teaching Assistant
  institution: Concordia University
  institution_website: https://www.concordia.ca/ginacody/info-systems-eng.html
  location: Montreal, Canada
  flag: CA
  term: Winter 2016
  year: 2016
  credits: 4 credits
  level: Graduate
  descr: "Security evaluation of information systems, software, and products. Security code inspection, security testing, security standards, and preparation of a security evaluation: impact, likelihood, and severity scales. Vulnerability analysis, risk analysis, and security plan elaboration. ITSEC, MARION, and MEHARI methods, OCTAVE, Common Criteria, target of evaluation, protection profiles, security functional and assurance requirements, assurance levels, and the evaluation process. IT security ethics, privacy, digital copyright, licensing IT security products, computer fraud and abuse, incident handling, business records, and security forensics, with security evaluation case studies. Information security governance: risk management, business strategy, standards, COBIT, and situation awareness. A project is required."
