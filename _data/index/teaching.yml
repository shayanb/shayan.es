- name: Fundamentos de Blockchain (Blockchain Fundamentals)
  role: Instructor
  institution: Nova School of Business & Economics (Nova SBE)
  institution_website: https://www.novasbe.unl.pt/en/
  location: Lisbon, Portugal
  flag: PT
  term: Fall 2026
  year: 2026
  upcoming: true
  credits: 3.5 ECTS
  level: Graduate
  descr: "Graduate course exploring blockchain as a transformative technology reshaping industries, particularly finance. Students gain foundational knowledge of distributed ledger systems and key concepts including decentralized applications (dApps), decentralized finance (DeFi), decentralized autonomous organizations (DAOs), smart contracts, and digital wallets, along with how blockchain affects organizational structures and intellectual property management. Lectures are complemented by real-world project discussions, in-class exercises, mini-projects, and workshops with guest experts. Offered across seven master's programs at Nova SBE, including the International Master's in Finance."
  website: https://guia.unl.pt/pt/2025/novasbe/program/M799/course/2622

