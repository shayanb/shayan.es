- name: INSE 6615 - Blockchain Technology
  role: Teaching Assistant
  institution: Concordia University
  institution_website: https://www.concordia.ca/ginacody/info-systems-eng.html
  location: Montreal, Canada
  flag: CA
  terms:
    - Winter 2018
    - Winter 2019
  year: 2019
  credits: 4 credits
  level: Graduate
  descr: "The course covers blockchain technology with an emphasis on its application to finance. Starting with the Bitcoin cryptocurrency, it covers the requisite cryptographic primitives (hash functions, digital signatures, commitments, accumulators, Merkle trees, proof of work) and explains the Bitcoin protocol (including transactions, blocks, network and software). It then focuses on programmable currency and contracts, explaining Bitcoin's scripting feature and the Ethereum blockchain. It covers the Solidity programming language, highlighting specific features that were added for the blockchain context (and don't exist in other object-oriented programming languages). Finally, the course covers blockchain use-cases including financial technology and government use. Assignments include deploying an actual contract to Ethereum's testnet. A project is required."
  website: https://www.pulpspy.com/courses/blockchain/index.html

